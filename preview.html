{name:'Animal Structure',items:[
['Anatomy','The study of the structure of an organism’s parts.','생물체 각 부분의 구조를 연구하는 학문.'],
['Physiology','The study of the function of an organism’s parts.','생물체 각 부분의 기능을 연구하는 학문.'],
['Structure fits function','The principle that biological structure is closely related to biological function.','구조는 기능에 맞게 되어 있다는 생물학의 기본 원리.'],
['Cell','The basic unit of all living organisms.','모든 생물의 기본 단위.'],
['Tissue','An integrated group of similar cells that performs a specific function.','비슷한 세포들이 모여 특정 기능을 수행하는 통합된 집단.'],
['Organ','A structure consisting of two or more tissues packaged into one working unit.','두 종류 이상의 조직이 하나의 기능 단위로 묶인 구조.'],
['Organ system','A team of organs that work together and perform vital body functions.','여러 기관이 함께 작동하여 중요한 신체 기능을 수행하는 체계.']
]},
{name:'Four Main Tissues',items:[

['Epithelium','Another name for epithelial tissue.','상피 조직의 다른 이름.'],
['Connective tissue','Tissue that supports and joins other tissues.','다른 조직을 지지하고 연결하는 조직.'],
['Extracellular matrix','Material outside cells in connective tissue that varies depending on tissue function.','결합 조직에서 세포 바깥을 채우는 물질.'],
['Muscle tissue','Tissue consisting of muscle fibers that contract when stimulated by a nerve signal.','신경 신호에 의해 수축하는 근섬유로 구성된 조직.'],
['Muscle fibers','Long, thin, cylindrical cells found in muscle tissue.','근육 조직을 이루는 길고 가는 원통형 세포.'],
['Skeletal muscle','A type of muscle tissue involved in body movement.','몸의 움직임에 관여하는 근육 조직.'],
['Cardiac muscle','A type of muscle tissue found in the heart.','심장에서 발견되는 근육 조직.'],
['Smooth muscle','A type of muscle tissue found in organs such as the digestive tract.','소화관 등 기관에 존재하는 근육 조직.'],
['Nervous tissue','Tissue that makes communication of information possible and coordinates body functions.','정보 전달과 몸 기능 조절을 담당하는 조직.'],
['Neuron','The basic unit of nervous tissue, also called a nerve cell.','신경 조직의 기본 단위인 신경세포.']
]},
{name:'Exchange with Environment',items:[
['Open system','A system that continuously exchanges chemicals and energy with its surroundings.','주변 환경과 물질 및 에너지를 지속적으로 교환하는 체계.'],
['External environment','The surroundings with which an animal exchanges materials and energy.','동물이 물질과 에너지를 교환하는 외부 환경.'],
['Internal environment','The fluid environment surrounding body cells inside an animal.','동물 몸 안에서 세포를 둘러싸는 내부 환경.'],
['Interstitial fluid','Fluid that fills spaces between cells and exchanges nutrients and wastes with blood vessels.','세포 사이 공간을 채우고 영양분·노폐물 교환에 관여하는 체액.'],
['Surface area','The exchange area increased by folded or branched internal surfaces.','주름지거나 가지친 내부 표면이 증가시키는 교환 면적.'],
['Digestive system','An organ system that exchanges materials with the external environment by obtaining nutrients.','영양분 획득을 통해 외부 환경과 물질을 교환하는 기관계.'],
['Respiratory system','An organ system that exchanges oxygen and carbon dioxide with the external environment.','산소와 이산화탄소를 외부 환경과 교환하는 기관계.'],
['Urinary system','An organ system that exchanges wastes and regulates water and solutes.','노폐물을 배출하고 물과 용질을 조절하는 기관계.']
]},
{name:'Homeostasis',items:[

['Reabsorption','The process that reclaims water and valuable solutes from filtrate and returns them to the blood.','물과 유용한 용질을 여과액에서 회수해 혈액으로 되돌리는 과정.'],
['Secretion','The transport of certain substances such as ions and drugs into the filtrate.','이온이나 약물 같은 물질을 여과액으로 이동시키는 과정.'],

]}

let current=null;
function escapeRegExp(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function blankDefinition(term, def){
  const blank='<span class="blank"></span>';
  if(!def) return blank;
  const pattern=new RegExp('\\b'+escapeRegExp(term)+'\\b','i');
  if(pattern.test(def)) return def.replace(pattern, blank);
  return blank+' — '+def;
}
function questionFromSentence(sentence, answer){
  const blank='<span class="blank"></span>';
  const pattern=new RegExp(escapeRegExp(answer),'i');
  const q=pattern.test(sentence) ? sentence.replace(pattern, blank) : sentence+' '+blank;
  return {q:q, a:answer, text:(sentence+' '+answer).toLowerCase()};
}
function chapterQuestionList(data){
  const seen=new Set();
  const out=[];
  data.sections.forEach(sec=>sec.items.forEach(([term,en])=>{
    const key=term.toLowerCase();
    if(seen.has(key)) return;
    seen.add(key);
    out.push({q:blankDefinition(term,en), a:term, text:(term+' '+en).toLowerCase()});
  }));
  return out;
}
function renderHome(){
  const box=document.getElementById('chapterCards');
  box.innerHTML='';
  Object.entries(chapters).forEach(([id,data])=>{
    const terms=data.sections.reduce((a,s)=>a+s.items.length,0);
    const qs=(id==='21'?data.questions.length:chapterQuestionList(data).length);
    const card=document.createElement('button');
    card.className='chapter-card';
    card.onclick=()=>openChapter(id);
    card.innerHTML=`<h2>${data.title}</h2><p class="muted">${data.desc}</p><div class="chapter-meta"><span class="mini">핵심용어 ${terms}개</span><span class="mini">예상문제 ${qs}개</span></div>`;
    box.appendChild(card);
  });
}
function openChapter(ch){
  current=ch;
  document.getElementById('home').style.display='none';
  document.getElementById('study').classList.add('active');
  document.getElementById('search').value='';
  renderStudy();
  window.scrollTo({top:0,behavior:'smooth'});
}
function goHome(){
  document.getElementById('study').classList.remove('active');
  document.getElementById('home').style.display='block';
  current=null;
  document.title='생명과학개론 Chapter 선택';
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderStudy(){
  const data=chapters[current];
  const qs=(current==='21'?data.questions.map(([sentence,answer])=>questionFromSentence(sentence,answer)):chapterQuestionList(data));
  document.title='생명과학개론 '+data.title;
  document.getElementById('studyTitle').textContent=data.title;
  document.getElementById('studyDesc').textContent=data.desc;
  document.getElementById('examTitle').textContent=data.title+' 예상 족보';
  document.getElementById('sourceText').textContent=data.source;
  const nav=document.getElementById('nav');nav.innerHTML='';
  const cards=document.getElementById('termCards');cards.innerHTML='';
  data.sections.forEach((s,i)=>{
    const b=document.createElement('button');b.textContent=s.name;b.onclick=()=>document.getElementById('sec'+i).scrollIntoView({behavior:'smooth',block:'start'});nav.appendChild(b);
    const h=document.createElement('h3');h.id='sec'+i;h.textContent=s.name;cards.appendChild(h);
    s.items.forEach(([term,en,kr])=>{
      const d=document.createElement('details');d.className='term searchable';d.dataset.text=(term+' '+en+' '+kr+' '+s.name).toLowerCase();
      d.innerHTML=`<summary><span><span class="en">${term}</span><br><span class="kr">${kr}</span></span><span class="tag">${s.name}</span></summary><div class="body"><span class="label">Definition</span><div class="def">${en}</div><span class="label" style="margin-top:10px">한국어</span><div class="def">${kr}</div></div>`;
      cards.appendChild(d);
    });
  });
  const qb=document.getElementById('quizBox');qb.innerHTML='';
  qs.forEach(({q,a,text})=>{
    const div=document.createElement('div');div.className='q searchable';div.dataset.text=text;div.onclick=()=>div.classList.toggle('show');
    div.innerHTML=`<span class="definition">${q}</span><div class="answer">Answer: <span class="answer-term">${a}</span></div>`;
    qb.appendChild(div);
  });
}
function showAnswers(){document.querySelectorAll('.q').forEach(x=>x.classList.add('show'))}
function hideAnswers(){document.querySelectorAll('.q').forEach(x=>x.classList.remove('show'))}
function expandAll(){document.querySelectorAll('details').forEach(x=>x.open=true)}
function collapseAll(){document.querySelectorAll('details').forEach(x=>x.open=false)}
function filterAll(){let q=document.getElementById('search').value.toLowerCase().trim();document.querySelectorAll('.searchable').forEach(el=>el.classList.toggle('hidden',q && !el.dataset.text.includes(q)))}
renderHome();
</script>
